# =============================================================================
# Module: modules/04_ospf2_napalm
# File:   data/ospf_advanced.yaml
# Desc:   Device inventory and variable definitions for OSPF Advanced lab.
#         Covers multi-area OSPF (PID 1), Area 0, Area 10, and Area 20 (NSSA),
#         with bidirectional redistribution between OSPF and two independent
#         EIGRP domains (AS 100 on the left, AS 111 on the right). Demonstrates
#         LSA Type 3 filtering on both ABRs, NSSA with default-information-
#         originate on the ABR, Type 4/5/7 LSA mechanics, and OSPF network
#         statement wildcard summarization for loopback prefix pools.
# =============================================================================

