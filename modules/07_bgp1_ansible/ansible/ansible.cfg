[defaults]
# Ansible configuration for Module 07 — BGP Part 1

# Inventory file
inventory = inventory/module07_bgp.yml

# Disable host key checking (lab environment)
host_key_checking = False

# Connection settings
timeout = 30
remote_user = netadmin

# Output settings
stdout_callback = yaml
bin_ansible_callbacks = True

# Retry files (disabled)
retry_files_enabled = False

# Gathering facts (disabled for network devices)
gathering = explicit

[inventory]
# Enable YAML inventory plugin
enable_plugins = yaml, ini

[persistent_connection]
# Connection persistence for network devices
connect_timeout = 30
command_timeout = 30
