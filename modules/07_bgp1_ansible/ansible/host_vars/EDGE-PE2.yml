---
# EDGE-PE2 (R7) — Provider Edge, ASBR
# Physical router: R7 (192.168.1.107)
# AS 65002 — Full mesh iBGP
# eBGP peer: CORE-PE2 (R3) in AS 65001

hostname: EDGE-PE2

# Loopback (RFC 2544 test address space for BGP)
loopback0_ip: 198.18.1.2
loopback0_mask: 255.255.255.255

# Data plane interfaces
interfaces:
  - name: Ethernet0/0
    description: "to CORE-PE2 (eBGP)"
    ip: 198.18.11.6
    mask: 255.255.255.252
    ospf_area: null
    shutdown: false
  
  - name: Ethernet0/1
    description: "to EDGE-PE1"
    ip: 10.7.12.2
    mask: 255.255.255.252
    ospf_area: 0
    shutdown: false
  
  - name: Ethernet0/2
    description: "to EDGE-P2"
    ip: 10.7.12.9
    mask: 255.255.255.252
    ospf_area: 0
    shutdown: false

# OSPF configuration
ospf_process_id: 2
ospf_router_id: 198.18.1.2

# BGP configuration
bgp_as: 65002
bgp_router_id: 198.18.1.2

# BGP networks to advertise
bgp_networks:
  - network: 198.18.1.2
    mask: 255.255.255.255

# iBGP peer group definition (full mesh)
bgp_peer_groups:
  - name: IBGP_PEERS
    remote_as: 65002
    update_source: Loopback0
    password: "{{ ibgp_password_as65002 }}"
    next_hop_self: true

# iBGP neighbors (full mesh - all other AS 65002 routers)
ibgp_neighbors:
  - ip: 198.18.1.1
    peer_group: IBGP_PEERS
  - ip: 198.18.1.3
    peer_group: IBGP_PEERS
  - ip: 198.18.1.4
    peer_group: IBGP_PEERS

# eBGP neighbors
ebgp_neighbors:
  - ip: 198.18.11.5
    remote_as: 65001
    password: "{{ ebgp_password_r3_r7 }}"
    description: "CORE-PE2"
