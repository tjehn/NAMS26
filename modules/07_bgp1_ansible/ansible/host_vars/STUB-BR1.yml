---
# STUB-BR1 (R10) — Stub AS border router
# Physical router: R10 (192.168.1.110)
# AS 65003 — No iBGP, no OSPF, eBGP only

hostname: STUB-BR1

# Loopback (RFC 2544 test address space for BGP)
loopback0_ip: 198.18.2.1
loopback0_mask: 255.255.255.255

# Data plane interfaces
interfaces:
  - name: Ethernet0/0
    description: "to EDGE-P1 (eBGP)"
    ip: 198.18.13.2
    mask: 255.255.255.252
    ospf_area: null
    shutdown: false

# No OSPF (stub AS)
ospf_process_id: null

# BGP configuration
bgp_as: 65003
bgp_router_id: 198.18.2.1

# BGP networks to advertise
bgp_networks:
  - network: 198.18.2.1
    mask: 255.255.255.255

# No iBGP (stub AS, single router)
bgp_peer_groups: []
ibgp_neighbors: []

# eBGP neighbors
ebgp_neighbors:
  - ip: 198.18.13.1
    remote_as: 65002
    password: "{{ ebgp_password_r8_r10 }}"
    description: "EDGE-P1"
