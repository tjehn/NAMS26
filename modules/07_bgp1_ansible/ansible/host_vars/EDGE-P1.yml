---
# EDGE-P1 (R8) — Provider router, ASBR
# Physical router: R8 (192.168.1.108)
# AS 65002 — Full mesh iBGP
# eBGP peer: STUB-BR1 (R10) in AS 65003

hostname: EDGE-P1

# Loopback (RFC 2544 test address space for BGP)
loopback0_ip: 198.18.1.3
loopback0_mask: 255.255.255.255

# Data plane interfaces
interfaces:
  - name: Ethernet0/0
    description: "to EDGE-PE1"
    ip: 10.7.12.6
    mask: 255.255.255.252
    ospf_area: 20
    shutdown: false
  
  - name: Ethernet0/1
    description: "to EDGE-P2"
    ip: 10.7.12.13
    mask: 255.255.255.252
    ospf_area: 20
    shutdown: false
  
  - name: Ethernet0/2
    description: "to STUB-BR1 (eBGP)"
    ip: 198.18.13.1
    mask: 255.255.255.252
    ospf_area: null
    shutdown: false

# OSPF configuration
ospf_process_id: 2
ospf_router_id: 198.18.1.3

# BGP configuration
bgp_as: 65002
bgp_router_id: 198.18.1.3

# BGP networks to advertise
bgp_networks:
  - network: 198.18.1.3
    mask: 255.255.255.255

# iBGP peer group definition (full mesh)
bgp_peer_groups:
  - name: IBGP_PEERS
    remote_as: 65002
    update_source: Loopback0
    password: "{{ ibgp_password_as65002 }}"
    next_hop_self: true

# iBGP neighbors (full mesh - all other AS 65002 routers)
ibgp_neighbors:
  - ip: 198.18.1.1
    peer_group: IBGP_PEERS
  - ip: 198.18.1.2
    peer_group: IBGP_PEERS
  - ip: 198.18.1.4
    peer_group: IBGP_PEERS

# eBGP neighbors
ebgp_neighbors:
  - ip: 198.18.13.2
    remote_as: 65003
    password: "{{ ebgp_password_r8_r10 }}"
    description: "STUB-BR1"
