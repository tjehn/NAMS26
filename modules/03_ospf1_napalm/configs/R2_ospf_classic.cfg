hostname R2
!
! =========================================
! Physical Interfaces
! =========================================
interface Ethernet0/0
 description To R1 R3 R11 - Area 0
 ip address 192.1.100.2 255.255.255.0
 ip ospf priority 10
 ip ospf authentication
 ip ospf authentication-key cisco123
 speed 100
 duplex full
 no shutdown
!
interface Ethernet0/1
 description UNUSED
 shutdown
!
interface Ethernet0/2
 description UNUSED
 shutdown
!
interface Ethernet0/3
 description UNUSED
 shutdown
!
interface Ethernet1/0
 description UNUSED
 shutdown
!
interface Ethernet1/1
 description UNUSED
 shutdown
!
interface Ethernet1/2
 description UNUSED
 shutdown
!
interface Serial2/0
 description To R5 - Area 0 MD5
 ip address 192.1.101.2 255.255.255.0
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 ccie123
 no shutdown
!
interface Serial2/1
 description UNUSED
 shutdown
!
interface Serial2/2
 description UNUSED
 shutdown
!
interface Serial2/3
 description UNUSED
 shutdown
!
! =========================================
! Loopback Interfaces
! =========================================
interface Loopback0
 description Router ID / OSPF Loopback
 ip address 2.2.2.2 255.0.0.0
 ip ospf network point-to-point
 no shutdown
!
! =========================================
! OSPF Process
! =========================================
router ospf 1
 router-id 0.0.0.2
 network 2.0.0.0 0.255.255.255 area 0
 network 192.1.100.0 0.0.0.255 area 0
 network 192.1.101.0 0.0.0.255 area 0
!