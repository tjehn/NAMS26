hostname R9
!
! =========================================
! Physical Interfaces
! =========================================
interface Ethernet0/0
 description To R8 - Area 10
 ip address 192.1.89.9 255.255.255.0
 speed 100
 duplex full
 no shutdown
!
interface Ethernet0/1
 description To R10 - Area 10
 ip address 192.1.90.9 255.255.255.0
 speed 100
 duplex full
 no shutdown
!
interface Ethernet0/2
 description UNUSED
 shutdown
!
interface Ethernet0/3
 description UNUSED
 shutdown
!
interface Ethernet1/0
 description UNUSED
 shutdown
!
interface Ethernet1/1
 description UNUSED
 shutdown
!
interface Ethernet1/2
 description UNUSED
 shutdown
!
! =========================================
! Loopback Interfaces
! =========================================
interface Loopback0
 description Router ID / OSPF Loopback
 ip address 9.9.9.9 255.0.0.0
 ip ospf network point-to-point
 no shutdown
!
! =========================================
! OSPF Process
! =========================================
router ospf 1
 router-id 0.0.0.9
 network 9.0.0.0 0.255.255.255 area 10
 network 192.1.89.0 0.0.0.255 area 10
 network 192.1.90.0 0.0.0.255 area 10
!