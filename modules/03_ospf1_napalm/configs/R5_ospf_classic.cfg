hostname R5
!
! =========================================
! Physical Interfaces
! =========================================
interface Ethernet0/0
 description UNUSED
 shutdown
!
interface Ethernet0/1
 description UNUSED
 shutdown
!
interface Ethernet0/2
 description UNUSED
 shutdown
!
interface Ethernet0/3
 description UNUSED
 shutdown
!
interface Ethernet1/0
 description UNUSED
 shutdown
!
interface Ethernet1/1
 description UNUSED
 shutdown
!
interface Ethernet1/2
 description UNUSED
 shutdown
!
interface Serial2/0
 description To R2 - Area 0 MD5
 ip address 192.1.101.5 255.255.255.0
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 ccie123
 no shutdown
!
interface Serial2/1
 description To R4 - Area 0 MD5
 encapsulation ppp
 ip address 192.1.102.5 255.255.255.0
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 ccie123
 no shutdown
!
interface Serial2/2
 description UNUSED
 shutdown
!
interface Serial2/3
 description UNUSED
 shutdown
!
! =========================================
! Loopback Interfaces
! =========================================
interface Loopback0
 description Router ID / OSPF Loopback
 ip address 5.5.5.5 255.0.0.0
 ip ospf network point-to-point
 no shutdown
!
! =========================================
! OSPF Process
! =========================================
router ospf 1
 router-id 0.0.0.5
 area 0 authentication message-digest
 network 5.0.0.0 0.255.255.255 area 0
 network 192.1.101.0 0.0.0.255 area 0
 network 192.1.102.0 0.0.0.255 area 0
!