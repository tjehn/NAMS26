hostname R8
!
! =========================================
! Physical Interfaces
! =========================================
interface Ethernet0/0
 description To R7 - Area 0 P2P
 ip address 192.1.78.8 255.255.255.0
 ip ospf network point-to-point
 speed 100
 duplex full
 no shutdown
!
interface Ethernet0/1
 description To R9 - Area 10
 ip address 192.1.89.8 255.255.255.0
 speed 100
 duplex full
 no shutdown
!
interface Ethernet0/2
 description UNUSED
 shutdown
!
interface Ethernet0/3
 description UNUSED
 shutdown
!
interface Ethernet1/0
 description UNUSED
 shutdown
!
interface Ethernet1/1
 description UNUSED
 shutdown
!
interface Ethernet1/2
 description UNUSED
 shutdown
!
! =========================================
! Loopback Interfaces
! =========================================
interface Loopback0
 description Router ID / OSPF Loopback
 ip address 8.8.8.8 255.0.0.0
 ip ospf network point-to-point
 no shutdown
!
! =========================================
! OSPF Process
! =========================================
router ospf 1
 router-id 0.0.0.8
 network 8.0.0.0 0.255.255.255 area 10
 network 192.1.78.0 0.0.0.255 area 0
 network 192.1.89.0 0.0.0.255 area 10
 area 0 range 192.1.100.0 255.255.252.0
!
end