hostname R7
!
! =========================================
! Physical Interfaces
! =========================================
interface Ethernet0/0
 description To R6 - Area 0
 ip address 192.1.67.7 255.255.255.0
 speed 100
 duplex full
 no shutdown
!
interface Ethernet0/1
 description To R8 - Area 0 P2P
 ip address 192.1.78.7 255.255.255.0
 ip ospf network point-to-point
 speed 100
 duplex full
 no shutdown
!
interface Ethernet0/2
 description UNUSED
 shutdown
!
interface Ethernet0/3
 description UNUSED
 shutdown
!
interface Ethernet1/0
 description UNUSED
 shutdown
!
interface Ethernet1/1
 description UNUSED
 shutdown
!
interface Ethernet1/2
 description UNUSED
 shutdown
!
! =========================================
! Loopback Interfaces
! =========================================
interface Loopback0
 description Router ID / OSPF Loopback
 ip address 7.7.7.7 255.0.0.0
 ip ospf network point-to-point
 no shutdown
!
! =========================================
! OSPF Process
! =========================================
router ospf 1
 router-id 0.0.0.7
 network 7.0.0.0 0.255.255.255 area 0
 network 192.1.67.0 0.0.0.255 area 0
 network 192.1.78.0 0.0.0.255 area 0
!