hostname R4
!
! =========================================
! Physical Interfaces
! =========================================
interface Ethernet0/0
 description To R3 R6 - Area 0 No Auth
 ip address 192.1.103.4 255.255.255.0
 ip ospf priority 10
 no shutdown
!
interface Ethernet0/1
 shutdown
!
interface Ethernet0/2
 shutdown
!
interface Ethernet0/3
 shutdown
!
interface Ethernet1/0
 shutdown
!
interface Ethernet1/1
 shutdown
!
interface Ethernet1/2
 shutdown
!
interface Serial2/0
 description To R5 - Area 0 MD5
 encapsulation ppp
 ip address 192.1.102.4 255.255.255.0
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 ccie123
 no shutdown
!
! =========================================
! Loopback Interfaces
! =========================================
interface Loopback0
 description Router ID / OSPF Loopback
 ip address 4.4.4.4 255.0.0.0
 ip ospf network point-to-point
 no shutdown
!
! =========================================
! OSPF Process
! =========================================
router ospf 1
 router-id 0.0.0.4
 network 192.1.103.0 0.0.0.255 area 0
 network 4.0.0.0 0.255.255.255 area 0
 network 192.1.102.0 0.0.0.255 area 0
!