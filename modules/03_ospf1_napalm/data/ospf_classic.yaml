# =============================================================================
# Module: modules/03_ospf1_napalm
# File:   data/ospf_classic.yaml
# Desc:   Device inventory and variable definitions for OSPF Classic lab.
#         Covers single-process OSPF (PID 1), Area 0 and Area 10, with
#         mixed authentication methods across segments — plain-text
#         (per-interface and area-level) and MD5 (per-interface and
#         area-level) — plus unauthenticated segments. Demonstrates
#         DR/BDR priority manipulation, point-to-point network type
#         override, inter-area summarization, and PPP encapsulation
#         on serial links.
#
# Interface Standards:
#   Active (UP/UP) Ethernet : speed: 100, duplex: full
#   Unused interfaces       : description: UNUSED, shutdown: true
#   Serial interfaces       : speed/duplex not applicable (leave empty)
#   OOB (Ethernet1/3)       : managed by base config — excluded from rendering
# =============================================================================

