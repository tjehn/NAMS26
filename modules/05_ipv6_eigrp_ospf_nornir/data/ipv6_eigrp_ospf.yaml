---
# =============================================================================
# Module: modules/05_ipv6_eigrp_ospf_nornir
# File:   data/ipv6_eigrp_ospf.yaml
# Desc:   Device inventory and variable definitions for IPv6 EIGRP/OSPF lab.
#         Pure IPv6 topology (no IPv4 routing). Two independent EIGRPv6 domains
#         (AS 100 left, AS 111 right) connect to a central OSPFv3 domain (PID 1)
#         via bidirectional redistribution at R1 and R6.
#
#         OSPFv3 areas:
#           Area 0  — backbone (R1, R2, R3)
#           Area 10 — totally stubby (R2 ABR, R4 ABR, R5, R9)
#           Area 20 — NSSA (R3 ABR no-summary, R4 ABR, R6 ASBR)
#
#         Interface-level ospf_area and eigrp_as drive per-interface
#         "ipv6 ospf <pid> area <area>" and "ipv6 eigrp <as>" commands.
#         No OSPF network statements — area assignment is per-interface.
# =============================================================================

lab_name: ipv6_eigrp_ospf_lab
ospf_process_id_default: 1

default_credentials: &creds
  username: netadmin
  password: admin

