# =============================================================================
# File     : utils/hosts.yaml
# Purpose  : Standalone host inventory for project-root utility scripts.
#            Used by init_ssh.py, check_ssh.py, and label_interfaces.py.
#            No routing config — connectivity data only.
#
#            This file is the single source of truth for all lab devices.
#            Module YAML files reference their own device subsets separately.
# =============================================================================

